services:
  - type: web
    name: play-backend
    env: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: python manage.py migrate --no-input && python -m daphne -b 0.0.0.0 -p $PORT config.asgi:application
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_LOG_LEVEL
        value: INFO
      - key: WEB_CONCURRENCY
        value: "1"
